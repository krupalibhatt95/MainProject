{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | OneInch Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">

            <div class="nav-links">
                <a href="{% url 'index' %}">HOME</a>
                <a href="{% url 'about' %}">ABOUT</a>
            </div>

            <div class="logo">
                <img src="{% static 'images/logo/COMING SOON.png' %}" alt="", class="logo">
            </div>

            <div class="nav-links">
                <a href="{% url 'portfolio' %}">PORTFOLIO</a>
                <a href="{% url 'contact' %}">CONTACT</a>
            </div>

        </div>
    </nav>


    <!-- PAGE HERO -->
    <section class="hero" style="background-image: url('{% static "images/pre-wedding/prewedding10.jpg" %}');">
        <div class="hero-content">
            <h1>Let’s Create Something Cinematic</h1>
        </div>
    </section>


    <!-- CONTACT FORM -->
    <section class="section">

        <h2 class="section-title">Get In Touch</h2>

        <form method = "POST">
            {% csrf_token %}
            <input type="text" name = "name"placeholder="Full Name" required>

            <input type="email" name = "email"placeholder="Email Address" required>

            <input type="tel" name = "tel"placeholder="Phone Number">

            <input type="text" name = "text"placeholder="Event Type (Pre-Wedding / Club / Portrait / Aftermovie)">

            <textarea rows="6" placeholder="Tell us about your vision..." required></textarea>

            <button type="submit" class="btn">SEND MESSAGE</button>

        </form>

    </section>


    <!-- INSTAGRAM -->
    <section class="section" style="background:#181818;">

        <h2 class="section-title">Follow Us</h2>

        <p style="margin-bottom:30px; letter-spacing:2px;">
            @one_inch.sensor
        </p>

        <a href="https://www.instagram.com/one_inch.sensor" target="_blank" class="btn">
            VISIT INSTAGRAM
        </a>

    </section>


    <!-- FOOTER -->
    <section class="section" style="padding:60px 0; font-size:13px; letter-spacing:2px;">
        © 2026 OneInch Sensor — All Rights Reserved
    </section>


    <!-- SCRIPT -->
    <script src="{% static 'script.js' %}"></script>

</body>
</html>
